services:
  accessible:
    build: .
    container_name: accessible
    restart: unless-stopped
    ports:
      - "8740:8000"
    volumes:
      - /tmp/accessible:/tmp/accessible
    environment:
      - PYTHONUNBUFFERED=1
    labels:
      - "com.caschulz.service=accessible"
      - "com.caschulz.description=Accessible — NDID ADA/WCAG 2.1 AA Compliance Tool"
